name: Sync to Repo B (Metadata Version)

on:
  pull_request:
    branches:
      - main
    types: [closed]

jobs:
  sync:
    # Only run if the PR was actually merged, not just closed
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo A
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push and PR to Repo B
        env:
          # Logic: Get the branch name directly from the PR metadata
          SOURCE_BRANCH: ${{ github.event.pull_request.head.ref }}
          REPO_B_NAME: "dqtran-glo/test2"
        run: |
          # 1. Setup destination
          git remote add destination "https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/dqtran-glo/test2.git"              
          
          # 2. Push the specific branch that was just merged
          # We use the head_sha to ensure we get the exact state of the PR
          git push destination ${{ github.event.pull_request.head.sha }}:refs/heads/$SOURCE_BRANCH --force

          # 3. Create PR in Repo B
          gh pr create \
            --repo $REPO_B_NAME \
            --head $SOURCE_BRANCH \
            --base main \
            --title "Sync: $SOURCE_BRANCH" \
            --body "Automated sync from Repo A PR #${{ github.event.pull_request.number }}"