name: Sync to Repo B

on:
  push:
    branches:
      - develop
      - main

jobs:
  create-pr-in-repo-b:
    runs-on: ubuntu-latest
    env:
      REPO_B: dqtran-glo/test2
      # Never push to BASE_BRANCH on repo B; only push this head branch, then open a PR into BASE_BRANCH.
      BASE_BRANCH: main
      SOURCE_REF: ${{ github.ref_name }}
      SYNC_BRANCH: sync/${{ github.ref_name }}
    steps:
      - name: Checkout Repo A
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Otherwise checkout persists GITHUB_TOKEN as an Authorization header for
          # github.com, and git push uses that (github-actions[bot]) instead of the PAT in the URL.
          persist-credentials: false

      - name: Push sync branch to Repo B (does not update main)
        env:
          PAT: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "PAT length: ${#PAT}"
          if [ "$SYNC_BRANCH" = "$BASE_BRANCH" ]; then
            echo "Refusing to push: SYNC_BRANCH must not equal BASE_BRANCH (would bypass PR)."
            exit 1
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          DEST_URL="https://x-access-token:${PAT}@github.com/${REPO_B}.git"
          git remote add destination "$DEST_URL"

          # Explicit refspec: only refs/heads/$SYNC_BRANCH on repo B is created/updated — not main.
          git push destination "refs/heads/${SOURCE_REF}:refs/heads/${SYNC_BRANCH}" --force

      - name: Create Pull Request in Repo B
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          PR_EXISTS=$(gh pr list --repo "$REPO_B" --head "$SYNC_BRANCH" --base "$BASE_BRANCH" --json number --jq '.[0].number')

          if [ -z "$PR_EXISTS" ] || [ "$PR_EXISTS" = "null" ]; then
            gh pr create \
              --repo "$REPO_B" \
              --title "Sync: ${SOURCE_REF} from Repo A" \
              --body "Automated sync from Repo A. Triggered by commit ${{ github.sha }}" \
              --head "$SYNC_BRANCH" \
              --base "$BASE_BRANCH"
          else
            echo "PR already exists (#$PR_EXISTS). Updates were pushed to the existing PR branch $SYNC_BRANCH."
          fi
