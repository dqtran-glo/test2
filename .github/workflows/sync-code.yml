name: Sync to Repo B

on:
  push:
    branches:
      - "**"

jobs:
  create-pr-in-repo-b:
    runs-on: ubuntu-latest
    env:
      REPO_B: dqtran-glo/test2
      BASE_BRANCH: main
      SOURCE_REF: ${{ github.ref_name }}
      TRIGGER_SHA: ${{ github.sha }}
    steps:
      - name: Checkout Repo A
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Push single commit to Repo B (same branch name as Repo A)
        env:
          PAT: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail
          echo "PAT length: ${#PAT}"

          if git rev-parse --verify --quiet "${TRIGGER_SHA}^2" >/dev/null 2>&1; then
            echo "Skipping: workflow trigger is a merge commit ($TRIGGER_SHA). Only non-merge commits are synced."
            echo "WORKFLOW_STOP=1" >> "$GITHUB_ENV"
            exit 0
          fi

          export GIT_AUTHOR_NAME="$(git show -s --format=%an "$TRIGGER_SHA")"
          export GIT_AUTHOR_EMAIL="$(git show -s --format=%ae "$TRIGGER_SHA")"
          export GIT_AUTHOR_DATE="$(git show -s --format=%ai "$TRIGGER_SHA")"
          export GIT_COMMITTER_NAME="$(git show -s --format=%cn "$TRIGGER_SHA")"
          export GIT_COMMITTER_EMAIL="$(git show -s --format=%ce "$TRIGGER_SHA")"
          export GIT_COMMITTER_DATE="$(git show -s --format=%ci "$TRIGGER_SHA")"

          DEST_URL="https://x-access-token:${PAT}@github.com/${REPO_B}.git"
          git remote add destination "$DEST_URL"

          # Parent must be Repo B's BASE_BRANCH tip so the head branch shares history with the PR base
          # (orphan commits cause: "branch has no history in common with main").
          git fetch destination "+refs/heads/${BASE_BRANCH}:refs/__sync_parent__"
          PARENT="$(git rev-parse refs/__sync_parent__)"

          TREE="$(git rev-parse "$TRIGGER_SHA^{tree}")"
          SINGLE_SHA="$(git show -s --format=%B "$TRIGGER_SHA" | git commit-tree "$TREE" -p "$PARENT")"

          # One new commit on top of Repo B's BASE_BRANCH; same tree/message/author as TRIGGER_SHA on Repo A.
          git push destination "${SINGLE_SHA}:refs/heads/${SOURCE_REF}" --force

      - name: Create Pull Request in Repo B
        if: ${{ env.WORKFLOW_STOP != '1' && env.SOURCE_REF != env.BASE_BRANCH }}
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail
          PR_EXISTS=$(gh pr list --repo "$REPO_B" --head "$SOURCE_REF" --base "$BASE_BRANCH" --json number --jq '.[0].number')

          if [ -z "$PR_EXISTS" ] || [ "$PR_EXISTS" = "null" ]; then
            gh pr create \
              --repo "$REPO_B" \
              --title "Sync: ${SOURCE_REF} from Repo A" \
              --body "Automated sync from Repo A (single commit from \`${TRIGGER_SHA}\`)." \
              --head "$SOURCE_REF" \
              --base "$BASE_BRANCH"
          else
            echo "PR already exists (#$PR_EXISTS). Branch ${SOURCE_REF} was updated."
          fi
