name: Sync to Repo B

on:
  push:
    branches:
        - develop
        - main

jobs:
  create-pr-in-repo-b:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo A
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Repo B
        env:
          # Format: https://<token>@github.com/owner/repo-b.git
          DEST_REPO: "https://${{ secrets.PAT_TOKEN }}@github.com/dqtran-glo/test2.git"
        run: |
          # Configure Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add Repo B as a remote and push the current branch
          git remote add destination $DEST_REPO
          git push destination ${{ github.ref_name }} --force

      - name: Create Pull Request in Repo B
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # Use the GitHub CLI (gh) to create the PR in the destination repo
          gh pr create \
            --repo dqtran-glo/test2 \
            --title "Sync: ${{ github.event.head_commit.message }}" \
            --body "Automated PR from Repo A. Triggered by commit ${{ github.sha }}" \
            --head ${{ github.ref_name }} \
            --base main