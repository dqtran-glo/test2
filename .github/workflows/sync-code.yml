name: Sync to Repo B

on:
  push:
    branches:
      - develop
      - main 

jobs:
  create-pr-in-repo-b:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo A
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Otherwise checkout persists GITHUB_TOKEN as an Authorization header for
          # github.com, and git push uses that (github-actions[bot]) instead of the PAT in the URL.
          persist-credentials: false

      - name: Push to Repo B
        env:
          PAT: ${{ secrets.PAT_TOKEN }}
          # Construct the URL with the token directly for the push command
          DEST_URL: "https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/dqtran-glo/test2.git"
        run: |
          echo "PAT length: ${#PAT}"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add Repo B as a remote
          git remote add destination "$DEST_URL"
          
          # Push the local branch to a branch of the SAME name on Repo B
          # Syntax: git push remote local_branch_name:remote_branch_name
          git push destination ${{ github.ref_name }}:${{ github.ref_name }} --force

      - name: Create Pull Request in Repo B
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # Check if a PR already exists for this branch to prevent workflow failure
          PR_EXISTS=$(gh pr list --repo dqtran-glo/test2 --head ${{ github.ref_name }} --json number --jq '.[0].number')
          
          if [ -z "$PR_EXISTS" ]; then
            gh pr create \
              --repo dqtran-glo/test2 \
              --title "Sync: ${{ github.ref_name }} from Repo A" \
              --body "Automated sync from Repo A. Triggered by commit ${{ github.sha }}" \
              --head ${{ github.ref_name }} \
              --base main
          else
            echo "PR already exists (#$PR_EXISTS). Updates were pushed to the existing PR."
          fi